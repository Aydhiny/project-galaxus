name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # Placeholder values so build-time DB/env validation passes in CI —
      # nothing in this workflow needs a real database connection.
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://user:password@localhost:5432/ci' }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-only-secret-not-used-in-production-32chars' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        # Pre-existing lint debt in files unrelated to CI setup — reporting only,
        # not blocking, until that's cleaned up as its own piece of work.
        run: npm run lint
        continue-on-error: true

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
